<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactivity with tailwind CSS</title>
    <link rel="stylesheet" href="output.css">
</head>
<body>
    <button class="bg-blue-400 p-2 m-2 rounded-md text-white block">Register - Simple Btn</button>
    <button class="bg-blue-400 p-2 m-2 rounded-md text-white block hover:bg-blue-700 hover:text-brown-400">Register - Hover Btn</button>
    <button class="bg-blue-400 p-2 m-2 rounded-md text-white block focus:bg-pink-500">Register - Focus Btn</button>
    <button class="bg-blue-400 p-2 m-2 rounded-md text-white block active:bg-purple-500">Register - Active Btn</button>
    <button class="bg-blue-400 p-2 m-2 rounded-md text-white block hover:bg-blue-700 focus:bg-yellow-400 active:bg-green-400">Register - Btn</button>


</body>
</html>
